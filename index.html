<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doruk Seyrek - Oyun Kütüphanesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-color: #f1c40f; /* Altın sarısı detaylar */
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Üst Menü (Navbar) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-area h1 {
            font-size: 24px;
            margin: 0;
        }

        .social-icons a {
            color: white;
            margin-left: 10px;
            font-size: 20px;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: var(--accent-color);
        }

        /* Hero Bölümü */
        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h2 {
            font-size: 48px;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: #222;
            color: white;
            margin-top: 20px;
        }

        /* Oyun Kartları */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px 5%;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
            border: 1px solid #333;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
        }

        .game-thumb {
            height: 180px;
            background: linear-gradient(45deg, #2c3e50, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        .game-info {
            padding: 20px;
        }

        .game-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .badge {
            background: #333;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 12px;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>Doruk Seyrek</h1>
            <div class="social-icons">
                <a href="https://youtube.com/@KANAL_ADIN" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="mailto:eposta@adresin.com"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
        <nav>
            <span style="margin-left:20px;">Ana Sayfa</span>
            <span style="margin-left:20px;">Aksiyon</span>
            <span style="margin-left:20px;">Spor</span>
        </nav>
    </header>

    <section class="hero">
        <h2>Oyun Kütüphanesi</h2>
        <p>YouTube kanalımda yaptığım tüm projeleri burada bulabilirsiniz.</p>
        <input type="text" class="search-bar" placeholder="Oyun ara...">
    </section>

    <div class="container">
        <div class="game-card">
            <div class="game-thumb" style="background: linear-gradient(45deg, #1d4350, #af4c59);">
                <i class="fas fa-futbol"></i>
            </div>
            <div class="game-info">
                <div class="game-title">KAFA TOPU (Gemini)</div>
                <span class="badge">Spor</span>
            </div>
        </div>

        <div class="game-card">
            <div class="game-thumb" style="background: linear-gradient(45deg, #1e3c72, #2a5298);">
                <i class="fas fa-crosshairs"></i>
            </div>
            <div class="game-info">
                <div class="game-title">VALORANT KLON</div>
                <span class="badge">Aksiyon</span>
            </div>
        </div>

        <div class="game-card">
            <div class="game-thumb" style="background: linear-gradient(45deg, #5a3f37, #2c7744);">
                <i class="fas fa-ghost"></i>
            </div>
            <div class="game-info">
                <div class="game-title">KARANLIK MAHZEN</div>
                <span class="badge">Korku</span>
            </div>
        </div>
    </div>

</body>
</html>
